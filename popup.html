<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highlight Saver</title>
  

  <!-- External CSS Stylesheet -->
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    
    <!-- 1. HEADER SECTION -->
    <header class="app-header">
      <h1>Highlight Saver</h1>
      <button id="settings-toggle-btn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </header>

    <!-- 2. SETTINGS PANEL (Slide-down modal styled in glassmorphism) -->
    <div id="settings-panel" class="settings-panel hidden">
      <h3>Configuration</h3>
      <div class="input-group">
        <label for="api-key-input">OpenAI API Key (for Summarization)</label>
        <div class="password-input-wrapper">
          <input type="password" id="api-key-input" placeholder="sk-proj-...">
          <button id="toggle-key-visibility" class="small-btn">Show</button>
        </div>
        <p class="helper-text">Key is saved securely in your local browser storage.</p>
      </div>
      
      <div class="settings-actions">
        <button id="save-settings-btn" class="primary-btn">Save Settings</button>
        <button id="clear-all-btn" class="danger-btn">Clear All Highlights</button>
      </div>
    </div>

    <!-- 3. MAIN DASHBOARD CONTENT -->
    <main class="app-main">

      <!-- Highlights Scroll Area -->
      <div id="highlights-container" class="highlights-list">
        <!-- Highlights cards will be injected dynamically by popup.js -->
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24">
            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
          </svg>
          <p class="empty-text-title">No highlights saved yet</p>
          <p class="empty-text-sub">Select text on any website and click "Save Highlight" to save your first highlight.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- External JS Logic -->
  <script src="popup.js"></script>
</body>
</html>
